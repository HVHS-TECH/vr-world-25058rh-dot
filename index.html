    <body>
    <a-scene>
      <a-sphere
      color="blue"
      scale="2 2 2"
      position="1 1 1"></a-sphere>
      <a-sky color="lighblue"></a-sky>
      
       <!-- Put this inside the <a-scene> -->
      <a-entity 
      ply-model="src:superman.ply"
      position="0 3 8"
      rotation="90 0 0"

      animation__first="
      property:position;
      to:0 3 -4;
      dur:2000;
      startEvents: loaded, animationcomplete__fourth"
      animation__second="
      property:rotation;
      to: 270 0 0;
      dur:3000;
      startEvents: animationcomplete__first"
      animation__third="
      property:position;
      to:0 3 8;
      dur:2000;
      startEvents: animationcomplete__second"
      animation__fourth="
      property:rotation;
      to:90 0 0;
      dur:3000;
      startEvents: animationcomplete__third"
      ></a-entity>

      <a-entity id="flashes" position="0 0 0"
