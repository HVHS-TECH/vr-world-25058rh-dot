<!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
    
  </head>
    <body>
    <a-scene>
      <a-sky color="#lighblue"></a-sky>
      
       <!-- Put this inside the <a-scene> -->
      <a-entity 
      ply-model="src:superman.ply"
      position="-3 1 -3"
      rotation="-90 0 90"
      ></a-entity>
      <a-entity 
      ply-model="src:superdoggy.ply"
      rotation="-90 0 90"
      animation="
      property:position;
      from:0.7 -1.5 -4;
      to:0.7 2 -4;
      loop:true;
      dir:alternate;"
      ></a-entity>
      <a-entity id="flashes" position="0 0 0"
      animation="
      property:rotation;
      from:0 0 0;
      to:0 360 0;
      dur:5000;
      loop:true;">
      <a-entity ply-model="src:flash.ply"
      position="20 -1.865 0"
      rotation=" 270 0 180"
      ></a-entity>
      <a-entity 
      ply-model="src:kid flash.ply"
      position="23 -1.865 0"
      rotation="270 0 180"
      ></a-entity> 
      </a-entity>


      <a-entity 
      ply-model="src:Iron man.ply"
      position="5.530 -2.052 8.907"
      rotation="-90 0 0"
      animation_first="
      property:position;
      to:5.530 4 8.907;
      dur:2000;
      startEvents: loaded, animationcomplete_fourth"
      animation_second="
      property:rotation;
      to: 90 0 0;
      dur:1000;
      startEvents: animationcomplete_first"
      animation_third="
      property:position;
      to:5.530 -2.052 8.907;
      dur:2000;
      startEvents: animationcomplete_second"
      animation_fourth="
      property:rotation;
      to:-90 0 0;
      dur:1000;
      startEvents: animationcomplete_third"
      ></a-entity>

      
      <a-entity 
      ply-model="src:supertower-0.ply"
      position="0 -1 -7"
